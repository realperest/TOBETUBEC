<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TobeTube V5</title>
    <link rel="stylesheet" href="/css/player.css" />
    <link rel="stylesheet" href="/css/player-v5.css" />
  </head>
  <body class="player-app" data-page-version="260424.0046">
    <div class="app-header">
      <div class="brand" role="img" aria-label="TobeTube">TobeTube</div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Ara" autocomplete="off" />
        <button type="button" id="searchRun">Ara</button>
        <button type="button" id="voiceSearch" title="Sesli ara">Mic</button>
        <span id="quotaLabel" aria-live="polite">0/100</span>
      </div>
      <div class="header-aside">
        <div id="authMessage" class="hidden" aria-hidden="true"></div>
        <div id="userLine" class="hidden" aria-hidden="true"></div>
        <button type="button" id="googleLogin">Google ile Giriş</button>
        <button type="button" id="googleLogout" class="hidden">Çıkış</button>
      </div>
    </div>
    <div class="player-layout">
      <div class="player-main">
        <div class="version-badge badge-v5">V5 yt-dlp</div>
        <div id="videoShell">
          <video id="hiddenVideo" playsinline crossorigin="anonymous"></video>
          <canvas id="viewCanvas5" width="1280" height="720" aria-label="Video"></canvas>
          <div id="speedMenu" class="speed-menu speed-menu--overlay" aria-hidden="true" aria-label="Oynatma hızı">
            <button type="button" class="speed-opt" data-rate="2">2x</button>
            <button type="button" class="speed-opt" data-rate="1.75">1.75x</button>
            <button type="button" class="speed-opt" data-rate="1.5">1.5x</button>
            <button type="button" class="speed-opt" data-rate="1.25">1.25x</button>
            <button type="button" class="speed-opt" data-rate="1" aria-pressed="true">Normal</button>
            <button type="button" class="speed-opt" data-rate="0.75">0.75x</button>
            <button type="button" class="speed-opt" data-rate="0.5">0.5x</button>
          </div>
        </div>
        <div class="controls">
          <div class="row-top">
            <div id="progress" aria-label="İlerleme">
              <div id="progressBuffered" aria-hidden="true"></div>
              <div id="progressFill"></div>
            </div>
          </div>
          <div class="row-mid">
            <span id="timeText">0:00 / 0:00</span>
            <div class="control-group control-volume">
              <button type="button" class="quality-btn icon-btn" id="volumeBtn" title="Ses" aria-label="Ses">🔊</button>
              <input id="volumeRange" type="range" min="0" max="1" step="0.01" value="1" aria-label="Ses seviyesi" />
            </div>
            <div class="control-group control-speed">
              <button type="button" class="quality-btn" id="speedBtn" title="Hız">1x</button>
            </div>
            <button type="button" class="quality-btn icon-btn" id="fsBtn" title="Tam ekran" aria-label="Tam ekran">⛶</button>
          </div>
        </div>
      </div>
      <aside class="suggestions" aria-label="Öneriler">
        <h2 class="q-title suggestions-title">Öneriler</h2>
        <ul id="sugList"></ul>
      </aside>
    </div>
    <div id="disconnect" aria-hidden="true" role="alert">Bağlantı kesildi.</div>
    <div class="app-bottom" aria-label="Oynatıcı sürümleri">
      <div class="bottom-rail" role="navigation">
        <button type="button" class="nav-home" id="mainHome" title="Ana">Ana</button>
        <button type="button" class="nav-v" data-v="3" title="V3">V3</button>
        <button type="button" class="nav-v" data-v="4" title="V4">V4</button>
        <button type="button" class="nav-v" data-v="5" aria-pressed="true" title="V5">V5</button>
      </div>
    </div>
    <div id="versionFooterP" aria-label="Sürüm"></div>
    <script src="/js/version-footer.js" defer></script>
    <script src="/js/ws-client.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/quota-display.js" defer></script>
    <script src="/js/player-topbar.js" defer></script>
    <script src="/js/player-common.js" defer></script>
    <script src="/js/buffer-tune.js" defer></script>
    <script src="/js/player-v5.js" defer></script>
  </body>
</html>
