<!DOCTYPE html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TobeTube</title>
    <link rel="stylesheet" href="/css/main.css" />
  </head>
  <body data-page-version="260424.0029">
    <div class="app-header">
      <div class="brand" role="img" aria-label="TobeTube">TobeTube</div>
      <div class="search-wrap">
        <input id="searchInput" type="search" placeholder="Ara" autocomplete="off" />
        <button type="button" id="searchRun">Ara</button>
        <button type="button" id="voiceSearch" title="Sesli ara">Mic</button>
        <span id="quotaLabel" aria-live="polite">0/100</span>
      </div>
      <div class="header-aside">
        <div id="authMessage" class="hidden" aria-hidden="true"></div>
        <div id="userLine" class="hidden" aria-hidden="true"></div>
        <button type="button" id="googleLogin">Google ile Giriş</button>
        <button type="button" id="googleLogout" class="hidden">Çıkış</button>
      </div>
    </div>
    <div class="category-row" id="catRow" aria-label="Kategori">
      <button type="button" class="cat-pill" data-key="tumu" aria-pressed="true">Tümü</button>
      <button type="button" class="cat-pill" data-key="haber" aria-pressed="false">Haber</button>
      <button type="button" class="cat-pill" data-key="oyun" aria-pressed="false">Oyun</button>
      <button type="button" class="cat-pill" data-key="teknoloji" aria-pressed="false">Teknoloji</button>
      <button type="button" class="cat-pill" data-key="spor" aria-pressed="false">Spor</button>
    </div>
    <div class="app-tabs" role="tablist" aria-label="Sekmeler">
      <button class="app-tab" id="tabHome" type="button" role="tab" aria-selected="true" aria-controls="panelHome" tabindex="0">Ana Sayfa</button>
      <button class="app-tab" id="tabHistory" type="button" role="tab" aria-selected="false" aria-controls="panelHistory" tabindex="-1">Geçmiş</button>
    </div>
    <div id="panelHome" class="grid-panel" role="tabpanel" aria-labelledby="tabHome"></div>
    <div id="panelHistory" class="grid-panel" hidden role="tabpanel" aria-labelledby="tabHistory">
      <p class="empty">Veritabanı yok; izleme geçmişi sonraki aşamada.</p>
    </div>
    <div class="app-bottom" aria-label="Oynatıcı sürümleri">
      <div class="bottom-rail" role="navigation">
        <button type="button" class="nav-home" data-action="home" id="mainHome" aria-pressed="true" title="Ana sayfaya dön">Ana</button>
        <button type="button" class="nav-v" data-v="1" aria-pressed="false" title="V1">V1</button>
        <button type="button" class="nav-v" data-v="2" aria-pressed="false" title="V2">V2</button>
        <button type="button" class="nav-v" data-v="3" aria-pressed="false" title="V3">V3</button>
        <button type="button" class="nav-v" data-v="4" aria-pressed="false" title="V4">V4</button>
        <button type="button" class="nav-v" data-v="5" aria-pressed="false" title="V5">V5</button>
      </div>
    </div>
    <div class="quality-lift" id="qualitySheet" aria-hidden="true" role="dialog" aria-label="Kalite ve sürüm">
      <div class="sheet" id="qualitySheetPanel">
        <div class="q-title" id="qualitySheetTitle">Kalite</div>
        <button type="button" class="q-opt" data-q="480" data-sym="Hizli 480p">Hizli (480p)</button>
        <button type="button" class="q-opt" data-q="720" data-sym="Dengeli 720p">Dengeli (720p)</button>
        <button type="button" class="q-opt" data-q="1080" data-sym="Kaliteli 1080p">Kaliteli (1080p)</button>
        <button type="button" class="q-opt" data-q="auto" data-sym="Otomatik ABR">Otomatik (ABR)</button>
      </div>
    </div>
    <div id="versionFooter" aria-label="Sürüm"></div>
    <script src="/js/version-footer.js" defer></script>
    <script src="/js/ws-client.js" defer></script>
    <script src="/js/auth.js" defer></script>
    <script src="/js/quota-display.js" defer></script>
    <script src="/js/search.js" defer></script>
    <script src="/js/app.js" defer></script>
  </body>
</html>
