[phases.setup]
nixPkgs = ["nodejs_20"]
aptPkgs = ["ffmpeg", "ca-certificates", "curl", "python3", "python3-pip"]

[phases.install]
cmds = [
  "python3 -m pip install --no-cache-dir --break-system-packages \"yt-dlp==2026.3.17\"",
  "npm ci --omit=dev || npm install --omit=dev"
]

[start]
cmd = "node server.js"

[variables]
NODE_ENV = "production"
